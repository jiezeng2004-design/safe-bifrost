# PatchWarden tunnel-client example configuration
#
# This is an example only. Do not commit real keys, tunnel IDs, account names,
# workspace IDs, or local private paths.

# Mode A: stdio
#
# On Windows, prefer the wrapper. It sets PATCHWARDEN_CONFIG and starts the
# MCP server from the PatchWarden project root.
#
# tunnel-client init \
#   --sample sample_mcp_stdio_local \
#   --profile patchwarden \
#   --tunnel-id tunnel_xxx \
#   --mcp-command "C:/path/to/patchwarden/scripts/mcp/patchwarden-mcp-stdio.cmd"

# Direct mode uses a separate profile and command:
#
# tunnel-client init \
#   --sample sample_mcp_stdio_local \
#   --profile patchwarden-direct \
#   --tunnel-id tunnel_xxx \
#   --mcp-command "C:/path/to/patchwarden/scripts/mcp/patchwarden-mcp-direct.cmd"

mcp:
  commands:
    - channel: main
      command: "C:/path/to/patchwarden/scripts/mcp/patchwarden-mcp-stdio.cmd"

# Mode B: HTTP
#
# Start PatchWarden HTTP first:
#
#   npm run start:http
#
# Then point tunnel-client at it:
#
#   tunnel-client init \
#     --sample sample_mcp_with_dcr \
#     --profile patchwarden-http \
#     --tunnel-id tunnel_xxx \
#     --mcp-server-url "http://127.0.0.1:7331/mcp"
#
# mcp:
#   server_urls:
#     - channel: main
#       url: "http://127.0.0.1:7331/mcp"
