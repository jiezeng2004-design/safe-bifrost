name: Bug report
description: Report a reproducible PatchWarden problem without sharing secrets.
title: "[Bug] "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: Do not paste API keys, tokens, cookies, `.env` contents, or unredacted task artifacts.
  - type: textarea
    id: summary
    attributes:
      label: Problem
      description: What happened, and what did you expect?
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version
      placeholder: patchwarden 0.4.0
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Minimal reproduction
      description: Include redacted commands and the first relevant error.
    validations:
      required: true
  - type: textarea
    id: doctor
    attributes:
      label: Redacted doctor output
      description: Use only output intended for diagnostics and review it before posting.
