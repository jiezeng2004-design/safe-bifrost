    <style id="theme-vars">
/* PatchWarden Brand CSS — Dark Security Theme */
/* Prefix: pw */

:root {
  /* ── Primary Palette ── */
  --pw-bg: #0a0e14;
  --pw-bg-elevated: #111820;
  --pw-bg-surface: #161d27;
  --pw-bg-hover: #1c2533;
  --pw-bg-active: #222d3d;
  --pw-border: #1e2a3a;
  --pw-border-subtle: #172030;
  --pw-border-focus: #2dd4a8;

  /* ── Text ── */
  --pw-text-primary: #e8edf4;
  --pw-text-secondary: #8b99ad;
  --pw-text-tertiary: #5a6a80;
  --pw-text-inverse: #0a0e14;
  --pw-text-accent: #2dd4a8;

  /* ── Brand Accent — Security Green ── */
  --pw-accent: #2dd4a8;
  --pw-accent-hover: #34eabc;
  --pw-accent-muted: rgba(45, 212, 168, 0.12);
  --pw-accent-subtle: rgba(45, 212, 168, 0.06);

  /* ── State Colors ── */
  --pw-state-success: #22c55e;
  --pw-state-success-bg: rgba(34, 197, 94, 0.1);
  --pw-state-warning: #f59e0b;
  --pw-state-warning-bg: rgba(245, 158, 11, 0.1);
  --pw-state-error: #ef4444;
  --pw-state-error-bg: rgba(239, 68, 68, 0.1);
  --pw-state-info: #3b82f6;
  --pw-state-info-bg: rgba(59, 130, 246, 0.1);

  /* ── Radius ── */
  --pw-radius-sm: 4px;
  --pw-radius-md: 8px;
  --pw-radius-lg: 12px;
  --pw-radius-full: 9999px;

  /* ── Shadows — static surfaces use border only; floating layers use subtle shadow ── */
  --pw-shadow-float: 0 8px 32px rgba(0, 0, 0, 0.4);
  --pw-shadow-modal: 0 16px 48px rgba(0, 0, 0, 0.5);

  /* ── Typography ── */
  --pw-font-sans: 'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif;
  --pw-font-mono: 'JetBrains Mono', 'Cascadia Code', 'Consolas', monospace;

  --pw-text-xs: 0.75rem;
  --pw-text-sm: 0.8125rem;
  --pw-text-base: 0.875rem;
  --pw-text-lg: 1rem;
  --pw-text-xl: 1.25rem;
  --pw-text-2xl: 1.5rem;
  --pw-text-3xl: 2rem;

  --pw-leading-tight: 1.25;
  --pw-leading-normal: 1.5;
  --pw-leading-relaxed: 1.625;

  --pw-weight-normal: 400;
  --pw-weight-medium: 500;
  --pw-weight-semibold: 600;
  --pw-weight-bold: 700;

  /* ── Spacing ── */
  --pw-space-1: 4px;
  --pw-space-2: 8px;
  --pw-space-3: 12px;
  --pw-space-4: 16px;
  --pw-space-5: 20px;
  --pw-space-6: 24px;
  --pw-space-8: 32px;
  --pw-space-10: 40px;
  --pw-space-12: 48px;

  /* ── Transitions ── */
  --pw-transition-fast: 150ms ease;
  --pw-transition-base: 200ms ease;
  --pw-transition-slow: 300ms ease;
}

html.dark {
  --pw-bg: #0a0e14;
  --pw-bg-elevated: #111820;
  --pw-bg-surface: #161d27;
  --pw-bg-hover: #1c2533;
  --pw-bg-active: #222d3d;
  --pw-border: #1e2a3a;
  --pw-border-subtle: #172030;
  --pw-text-primary: #e8edf4;
  --pw-text-secondary: #8b99ad;
  --pw-text-tertiary: #5a6a80;
}

    </style>
    <script src="/vendor/tailwindcss-browser.js"></script>
    <script src="/vendor/lucide.js"></script>
    <style type="text/tailwindcss">
  @theme inline {
    --color-accent: var(--pw-accent);
    --color-border: var(--pw-border);
  }
  @layer base {
    body { background: var(--pw-background); color: var(--pw-text-primary); }
    td, th { @apply break-words; word-break: break-all; word-break: auto-phrase; }
    th { @apply whitespace-nowrap; }
  }
    </style>
    <style>
      .no-scrollbar::-webkit-scrollbar { display: none; }
      .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
      [data-icon] {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        -webkit-mask-size: contain;
        mask-size: contain;
        -webkit-mask-repeat: no-repeat;
        mask-repeat: no-repeat;
        -webkit-mask-position: center;
        mask-position: center;
        background-color: currentColor;
      }
      .pw-spin {
        animation: pw-spin 0.9s linear infinite;
      }
      @keyframes pw-spin {
        from { transform: rotate(0deg); }
        to { transform: rotate(360deg); }
      }
      .pw-row-selected {
        background-color: var(--pw-bg-active) !important;
      }
    </style>
</head>

    <!-- Page Content Area -->

      <!-- ===== 1. Summary Stats Row ===== -->

        <!-- 总审计 -->

          </div>
        </div>
        <!-- 通过 -->

          </div>
          <div class="min-w-0">
            <div class="text-xs truncate" style="color: var(--pw-text-tertiary);" data-zh="通过" data-en="Passed">通过</div>

          </div>
        </div>
        <!-- 失败 -->
        <div class="flex items-center gap-3 px-4 py-3 rounded-lg" style="background-color: var(--pw-bg-surface); border-left: 3px solid var(--pw-state-error);">
          <div class="shrink-0 w-9 h-9 rounded-lg flex items-center justify-center" style="background-color: var(--pw-state-error-bg);">
            <i data-lucide="x-circle" class="w-4 h-4" style="color: var(--pw-state-error);"></i>
          </div>
          <div class="min-w-0">
            <div class="text-xs truncate" style="color: var(--pw-text-tertiary);" data-zh="失败" data-en="Failed">失败</div>
            <div id="statFail" class="text-xl font-bold whitespace-nowrap" style="color: var(--pw-state-error); font-variant-numeric: tabular-nums;">--</div>
          </div>
        </div>
      </section>

      <!-- ===== 2. Audit Log Table ===== -->
      <section class="rounded-lg overflow-hidden mb-6" style="background-color: var(--pw-bg-surface); border: 1px solid var(--pw-border); border-left: 3px solid var(--pw-accent);">

            <line x1="16.24" y1="7.76" x2="19.07" y2="4.93"/>
          </svg>
          <p class="text-sm" style="color: var(--pw-text-tertiary); font-family: var(--pw-font-sans);" data-zh="加载中..." data-en="Loading...">加载中...</p>
        </div>

        <!-- Error State -->
        <div id="errorState" class="hidden py-16 text-center">
          <svg class="inline-block mb-3" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="var(--pw-state-error)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">

          </svg>
          <p class="text-sm" style="color: var(--pw-text-tertiary); font-family: var(--pw-font-sans);" data-zh="暂无审计记录" data-en="No Audit Records">暂无审计记录</p>
        </div>

        <!-- Table -->
        <div id="tableWrapper" class="hidden overflow-x-auto">
          <table class="w-full text-sm" style="min-width: 640px;">
            <thead>

                <th class="px-4 py-3 text-left text-xs font-semibold whitespace-nowrap" style="color: var(--pw-text-tertiary);" data-zh="任务ID" data-en="Task ID">任务ID</th>
                <th class="px-4 py-3 text-left text-xs font-semibold whitespace-nowrap" style="color: var(--pw-text-tertiary);" data-zh="裁定" data-en="Verdict">裁定</th>
                <th class="px-4 py-3 text-left text-xs font-semibold whitespace-nowrap" style="color: var(--pw-text-tertiary);" data-zh="范围变更" data-en="Scope Changes">范围变更</th>
                <th class="px-4 py-3 text-right text-xs font-semibold whitespace-nowrap" style="color: var(--pw-text-tertiary);" data-zh="审计时间" data-en="Audit Time">审计时间</th>
              </tr>
            </thead>
            <tbody id="auditTableBody">
              <!-- Rendered by JavaScript -->
            </tbody>
          </table>
        </div>
      </section>

      <!-- ===== 3. Evidence Panel ===== -->
      <section id="evidencePanel" class="hidden rounded-lg overflow-hidden" style="background-color: var(--pw-bg-surface); border: 1px solid var(--pw-border); border-left: 3px solid var(--pw-accent);">
        <div class="px-5 py-4" style="border-bottom: 1px solid var(--pw-border-subtle);">

            <span id="evidenceTaskId" class="text-xs px-2 py-0.5 rounded-md whitespace-nowrap" style="font-family: var(--pw-font-mono); color: var(--pw-text-accent); background-color: var(--pw-accent-subtle);"></span>
          </div>
        </div>
        <div class="px-5 py-4">
          <pre id="evidenceJson" class="text-xs overflow-auto" style="font-family: var(--pw-font-mono); color: var(--pw-text-secondary); line-height: var(--pw-leading-relaxed); max-height: 480px; white-space: pre-wrap; word-break: break-word;"></pre>
        </div>
      </section>

    </main>

  </div>

  <!-- Active nav item styling + sidebar hover states -->
  <style>
    [data-nav-key] {
      transition: background-color var(--pw-transition-fast), color var(--pw-transition-fast);
    }
    [data-nav-key]:hover {
      background-color: var(--pw-bg-hover);
      color: var(--pw-text-primary);
    }
    [data-nav-key][data-active="true"] {
      background-color: var(--pw-accent-subtle);
      color: var(--pw-accent);
      border-left: 3px solid var(--pw-accent);
      padding-left: 9px;
    }
    input[type="text"]:focus {
      border-color: var(--pw-border-focus);
      background-color: var(--pw-bg-hover);
    }
    input[type="text"]::placeholder {
      color: var(--pw-text-tertiary);
    }
    /* Table row hover */
    tbody tr {
      transition: background-color var(--pw-transition-fast);
    }
    tbody tr:hover {
      background-color: var(--pw-bg-hover);
    }
    /* Reduced motion */
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        transition-duration: 0.01ms !important;
        animation-duration: 0.01ms !important;
      }
      .pw-spin {
        animation-duration: 1.5s;
      }
    }
    /* Button hover states */
    button:hover {
      filter: brightness(1.1);
    }
    button:active {
      filter: brightness(0.95);
      transform: scale(0.98);
    }
    button:focus-visible {
      outline: 2px solid var(--pw-border-focus);
      outline-offset: 1px;
    }
    /* Refresh button hover */
    #refreshBtn:hover {
      background-color: var(--pw-bg-hover) !important;
      color: var(--pw-text-primary) !important;
      border-color: var(--pw-border-focus) !important;
    }
    /* Retry button hover */
    #retryBtn:hover {
      background-color: var(--pw-bg-active) !important;
      color: var(--pw-text-primary) !important;
    }
  </style>

  <script>
    (function () {
      'use strict';

      var API_URL = '/api/audit';

      var allAudits = [];
      var selectedTaskId = null;

      // ---- DOM helpers ----
      function $(id) { return document.getElementById(id); }
      function show(el) { el && el.classList.remove('hidden'); }
      function hide(el) { el && el.classList.add('hidden'); }

      function escapeHtml(s) {
        if (s === null || s === undefined) return '';
        return String(s).replace(/[&<>"']/g, function (c) {
          return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c];
        });
      }

      function escapeAttr(s) { return escapeHtml(s); }

      function truncate(s, n) {
        if (!s) return '';
        s = String(s);
        return s.length > n ? s.slice(0, n) + '…' : s;
      }

      function pad2(n) { return String(n).padStart(2, '0'); }

      function formatTime(iso) {
        if (!iso) return '—';
        var d = new Date(iso);
        if (isNaN(d.getTime())) return String(iso);
        return d.getFullYear() + '-' + pad2(d.getMonth() + 1) + '-' + pad2(d.getDate())
             + ' ' + pad2(d.getHours()) + ':' + pad2(d.getMinutes());
      }

      // Resolve verdict from record. Real API spreads audit.json at top level;
      // direct-session audits use "decision" instead of "verdict".
      function resolveVerdict(record) {
        if (!record) return '';
        var v = record.verdict || record.decision || record.audited_verdict;
        return v ? String(v).toLowerCase() : '';
      }

      // Resolve scope_changes. May be absent in real audit.json → returns ''.
      function resolveScopeChanges(record) {
        if (!record) return '';
        var v = record.scope_changes;
        if (v === undefined || v === null) {
          // Some audit records nest scope info under checks; not reliable. Leave blank.
          return '';
        }
        return String(v).toLowerCase();
      }

      // Resolve checked_at timestamp. Falls back to other common timestamp fields.
      function resolveCheckedAt(record) {
        if (!record) return '';
        return record.checked_at || record.audited_at || record.timestamp || record.created_at || '';
      }

      // Determine the "details" payload for the evidence panel.
      // Spec: details field. Real API: audit.json spread at top level (no wrapper).
      // Prefer record.details when present; otherwise show the whole record.
      function resolveDetails(record) {
        if (!record) return null;
        if (record.details !== undefined && record.details !== null) {
          return record.details;
        }
        // Shallow copy without task_id to reduce noise; keep everything else.
        var copy = {};
        for (var k in record) {
          if (Object.prototype.hasOwnProperty.call(record, k) && k !== 'task_id') {
            copy[k] = record[k];
          }
        }
        return copy;
      }

      // ---- State rendering ----
      function showLoading() {
        show($('loadingState'));
        hide($('errorState'));
        hide($('emptyState'));
        hide($('tableWrapper'));
        hide($('evidencePanel'));
      }

      function showError(msg) {
        hide($('loadingState'));
        show($('errorState'));
        hide($('emptyState'));
        hide($('tableWrapper'));
        hide($('evidencePanel'));
        $('errorMessage').textContent = msg || '未知错误';
      }

      function showEmpty() {
        hide($('loadingState'));
        hide($('errorState'));
        show($('emptyState'));
        hide($('tableWrapper'));
        hide($('evidencePanel'));
      }

      function showTable() {
        hide($('loadingState'));
        hide($('errorState'));
        hide($('emptyState'));
        show($('tableWrapper'));
      }

      // ---- Badge rendering ----
      // kind: 'verdict' | 'scope'
      function badgeFor(value, kind) {
        var v = String(value || '').toLowerCase();
        var bg, color, border;
        if (v === 'pass') {
          bg = 'var(--pw-state-success-bg)';
          color = 'var(--pw-state-success)';
          border = 'var(--pw-state-success)';
        } else if (v === 'fail') {
          bg = 'var(--pw-state-error-bg)';
          color = 'var(--pw-state-error)';
          border = 'var(--pw-state-error)';
        } else if (v === 'warn' || v === 'warning') {
          bg = 'var(--pw-state-warning-bg)';
          color = 'var(--pw-state-warning)';
          border = 'var(--pw-state-warning)';
        } else {
          // Unknown / missing
          bg = 'var(--pw-bg-hover)';
          color = 'var(--pw-text-tertiary)';
          border = 'var(--pw-border-subtle)';
        }
        var label = v || (kind === 'scope' ? '—' : '—');
        return '<span class="inline-flex items-center px-2.5 py-0.5 rounded-md text-xs font-medium whitespace-nowrap" style="background-color: ' + bg + '; color: ' + color + '; border-left: 3px solid ' + border + ';">' + escapeHtml(label) + '</span>';
      }

      // ---- Row rendering ----
      function renderRow(record, idx) {
        var taskId = record.task_id || '';
        var truncatedId = truncate(taskId, 18);
        var verdict = resolveVerdict(record);
        var scope = resolveScopeChanges(record);
        var checkedAt = resolveCheckedAt(record);
        var altBg = (idx % 2 === 1) ? ' background-color: var(--pw-bg-hover);' : '';
        var selectedCls = (taskId && taskId === selectedTaskId) ? ' pw-row-selected' : '';

        var detailHref = '/pages/task-detail.html?id=' + encodeURIComponent(taskId);

        return ''
          + '<tr class="cursor-pointer transition-colors' + selectedCls + '" style="border-bottom: 1px solid var(--pw-border-subtle);' + altBg + '" data-task-id="' + escapeAttr(taskId) + '">'
          +   '<td class="px-4 py-3 whitespace-nowrap">'
          +     '<a href="' + detailHref + '" class="inline-block hover:underline" style="font-family: var(--pw-font-mono); font-size: var(--pw-text-xs); color: var(--pw-text-accent);" title="' + escapeAttr(taskId) + '">' + escapeHtml(truncatedId) + '</a>'
          +   '</td>'
          +   '<td class="px-4 py-3 whitespace-nowrap">' + badgeFor(verdict, 'verdict') + '</td>'
          +   '<td class="px-4 py-3 whitespace-nowrap">' + badgeFor(scope, 'scope') + '</td>'
          +   '<td class="px-4 py-3 text-right whitespace-nowrap" style="font-family: var(--pw-font-mono); font-size: var(--pw-text-xs); color: var(--pw-text-tertiary);" title="' + escapeAttr(checkedAt) + '">' + escapeHtml(formatTime(checkedAt)) + '</td>'
          + '</tr>';
      }

      function renderTable() {
        if (allAudits.length === 0) {
          showEmpty();
          return;
        }
        var html = '';
        for (var i = 0; i < allAudits.length; i++) {
          html += renderRow(allAudits[i], i);
        }
        $('auditTableBody').innerHTML = html;
        showTable();

        // Wire row click → show evidence
        var rows = $('auditTableBody').querySelectorAll('tr[data-task-id]');
        for (var r = 0; r < rows.length; r++) {
          rows[r].addEventListener('click', handleRowClick);
        }
      }

      function renderStats() {
        var total = allAudits.length;
        var passCount = 0;
        var failCount = 0;
        for (var i = 0; i < allAudits.length; i++) {
          var v = resolveVerdict(allAudits[i]);
          if (v === 'pass') passCount++;
          else if (v === 'fail') failCount++;
        }
        $('statTotal').textContent = String(total);
        $('statPass').textContent = String(passCount);
        $('statFail').textContent = String(failCount);
      }

      function renderEvidence(record) {
        var panel = $('evidencePanel');
        if (!record) {
          hide(panel);
          return;
        }
        $('evidenceTaskId').textContent = record.task_id || '—';
        var details = resolveDetails(record);
        var jsonText;
        try {
          jsonText = JSON.stringify(details, null, 2);
        } catch (e) {
          jsonText = String(details);
        }
        $('evidenceJson').textContent = jsonText;
        show(panel);
      }

      function handleRowClick(e) {
        // If the click originated on the <a> link, let it navigate; don't toggle evidence.
        if (e && e.target && (e.target.tagName === 'A' || e.target.closest('a'))) {
          return;
        }
        var tr = e.currentTarget;
        var taskId = tr.getAttribute('data-task-id') || '';
        if (selectedTaskId && selectedTaskId === taskId) {
          // Toggle off
          selectedTaskId = null;
          tr.classList.remove('pw-row-selected');
          hide($('evidencePanel'));
          return;
        }
        // Clear previous selection
        var prev = $('auditTableBody').querySelector('tr.pw-row-selected');
        if (prev) prev.classList.remove('pw-row-selected');
        selectedTaskId = taskId;
        tr.classList.add('pw-row-selected');
        // Find record
        var record = null;
        for (var i = 0; i < allAudits.length; i++) {
          if (allAudits[i].task_id === taskId) {
            record = allAudits[i];
            break;
          }
        }
        renderEvidence(record);
      }

      // ---- API call ----
      function setRefreshing(isRefreshing) {
        var icon = $('refreshIcon');
        if (!icon) return;
        if (isRefreshing) {
          icon.classList.add('pw-spin');
        } else {
          icon.classList.remove('pw-spin');
        }
      }

      function fetchAudits() {
        showLoading();
        setRefreshing(true);
        fetch(API_URL, {
          method: 'GET',
          headers: { 'Accept': 'application/json' },
          cache: 'no-store'
        })
          .then(function (res) {
            if (!res.ok) {
              return res.text().then(function (body) {
                throw new Error('HTTP ' + res.status + (body ? (': ' + body.slice(0, 200)) : ''));
              });
            }
            return res.json();
          })
          .then(function (data) {
            allAudits = (data && Array.isArray(data.audits)) ? data.audits : [];
            selectedTaskId = null;
            renderStats();
            renderTable();
          })
          .catch(function (err) {
            var msg = (err && err.message) ? err.message : '未知错误';
            if (err && err.name === 'TypeError' && /fetch/i.test(msg)) {
              msg = '无法连接到 ' + API_URL + '（请确认 PatchWarden 服务正在运行）';
            }
            showError(msg);
          })
          .finally(function () {
            setRefreshing(false);
          });
      }

      // ---- Event wiring ----
      $('refreshBtn').addEventListener('click', fetchAudits);

      var retryBtn = $('retryBtn');
      if (retryBtn) {
        retryBtn.addEventListener('click', fetchAudits);
      }

      // Initial load
      fetchAudits();
    })();
  </script>

  <!-- Lucide init -->
  <script>lucide.createIcons();</script>
</body>
</html>
