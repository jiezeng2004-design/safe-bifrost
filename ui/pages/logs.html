/* PatchWarden Brand CSS — Dark Security Theme */
/* Prefix: pw */

:root {
  --pw-bg: #0a0e14;
  --pw-bg-elevated: #111820;
  --pw-bg-surface: #161d27;
  --pw-bg-hover: #1c2533;
  --pw-bg-active: #222d3d;
  --pw-border: #1e2a3a;
  --pw-border-subtle: #172030;
  --pw-border-focus: #2dd4a8;

  --pw-text-primary: #e8edf4;
  --pw-text-secondary: #8b99ad;
  --pw-text-tertiary: #5a6a80;
  --pw-text-inverse: #0a0e14;
  --pw-text-accent: #2dd4a8;

  --pw-accent: #2dd4a8;
  --pw-accent-hover: #34eabc;
  --pw-accent-muted: rgba(45, 212, 168, 0.12);
  --pw-accent-subtle: rgba(45, 212, 168, 0.06);

  --pw-state-success: #22c55e;
  --pw-state-success-bg: rgba(34, 197, 94, 0.1);
  --pw-state-warning: #f59e0b;
  --pw-state-warning-bg: rgba(245, 158, 11, 0.1);
  --pw-state-error: #ef4444;
  --pw-state-error-bg: rgba(239, 68, 68, 0.1);
  --pw-state-info: #3b82f6;
  --pw-state-info-bg: rgba(59, 130, 246, 0.1);

  --pw-radius-sm: 4px;
  --pw-radius-md: 8px;
  --pw-radius-lg: 12px;
  --pw-radius-full: 9999px;

  --pw-shadow-float: 0 8px 32px rgba(0, 0, 0, 0.4);
  --pw-shadow-modal: 0 16px 48px rgba(0, 0, 0, 0.5);

  --pw-font-sans: 'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif;
  --pw-font-mono: 'JetBrains Mono', 'Cascadia Code', 'Consolas', monospace;

  --pw-text-xs: 0.75rem;
  --pw-text-sm: 0.8125rem;
  --pw-text-base: 0.875rem;
  --pw-text-lg: 1rem;
  --pw-text-xl: 1.25rem;
  --pw-text-2xl: 1.5rem;
  --pw-text-3xl: 2rem;

  --pw-leading-tight: 1.25;
  --pw-leading-normal: 1.5;
  --pw-leading-relaxed: 1.625;

  --pw-weight-normal: 400;
  --pw-weight-medium: 500;
  --pw-weight-semibold: 600;
  --pw-weight-bold: 700;

  --pw-space-1: 4px;
  --pw-space-2: 8px;
  --pw-space-3: 12px;
  --pw-space-4: 16px;
  --pw-space-5: 20px;
  --pw-space-6: 24px;
  --pw-space-8: 32px;
  --pw-space-10: 40px;
  --pw-space-12: 48px;

  --pw-transition-fast: 150ms ease;
  --pw-transition-base: 200ms ease;
  --pw-transition-slow: 300ms ease;
}

html.dark {
  --pw-bg: #0a0e14;
  --pw-bg-elevated: #111820;
  --pw-bg-surface: #161d27;
  --pw-bg-hover: #1c2533;
  --pw-bg-active: #222d3d;
  --pw-border: #1e2a3a;
  --pw-border-subtle: #172030;
  --pw-text-primary: #e8edf4;
  --pw-text-secondary: #8b99ad;
  --pw-text-tertiary: #5a6a80;
}
    </style>

  <script>
  (function () {
    'use strict';

    var DEFAULT_CATEGORY = 'core';
    var DEFAULT_TAIL = 100;
    var AUTO_REFRESH_INTERVAL_MS = 5000;

    var currentCategory = DEFAULT_CATEGORY;
    var currentTail = DEFAULT_TAIL;
    var autoRefreshTimer = null;

    function $(id) { return document.getElementById(id); }
    function hide(el) { if (el) el.classList.add('hidden'); }
    function show(el) { if (el) el.classList.remove('hidden'); }
    function text(el, value) { if (el) el.textContent = value; }

    function escapeHtml(s) {
      if (s === null || s === undefined) return '';
      return String(s).replace(/[&<>"']/g, function (c) {
        return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c];
      });
    }

    function pad2(n) { return String(n).padStart(2, '0'); }
    function fmtTime(iso) {
      if (!iso) return '—';
      var d = new Date(iso);
      if (isNaN(d.getTime())) return String(iso);
      return d.getFullYear() + '-' + pad2(d.getMonth() + 1) + '-' + pad2(d.getDate())
           + ' ' + pad2(d.getHours()) + ':' + pad2(d.getMinutes()) + ':' + pad2(d.getSeconds());
    }

    function showError(msg) {
      var banner = $('error-banner');
      var message = $('error-message');
      if (message) message.textContent = msg || '未知错误';
      if (banner) show(banner);
    }
    function clearError() {
      var banner = $('error-banner');
      if (banner) hide(banner);
    }
    function setRefreshing(b) {
      var icon = $('refreshIcon');
      if (!icon) return;
      if (b) icon.classList.add('pw-spin'); else icon.classList.remove('pw-spin');
    }
    function setLastUpdated() {
      var el = $('lastUpdated');
      if (!el) return;
      el.textContent = '更新于 ' + fmtTime(new Date().toISOString());
      show(el);
    }

    function setCategory(cat) {
      currentCategory = cat;
      var btns = document.querySelectorAll('.cat-btn');
      for (var i = 0; i < btns.length; i++) {
        var b = btns[i];
        if (b.getAttribute('data-cat') === cat) {
          b.setAttribute('data-active', 'true');
        } else {
          b.removeAttribute('data-active');
        }
      }
    }

    function renderLogs(data) {
      var stdout = (data && data.stdout) || '';
      var stderr = (data && data.stderr) || '';
      var reason = (data && data.reason) || null;
      var tail = (data && data.tail) || currentTail;

      // stdout
      var stdoutEl = $('stdoutContent');
      var stdoutEmpty = $('stdoutEmpty');
      if (stdout) {
        text(stdoutEl, stdout);
        show(stdoutEl);
        hide(stdoutEmpty);
      } else {
        hide(stdoutEl);
        show(stdoutEmpty);
      }
      text($('stdoutMeta'), 'tail=' + tail + (reason ? ' · ' + reason : ''));

      // stderr
      var stderrEl = $('stderrContent');
      var stderrEmpty = $('stderrEmpty');
      if (stderr) {
        text(stderrEl, stderr);
        show(stderrEl);
        hide(stderrEmpty);
      } else {
        hide(stderrEl);
        show(stderrEmpty);
      }
      text($('stderrMeta'), 'tail=' + tail + (reason ? ' · ' + reason : ''));
    }

    function loadLogs() {
      clearError();
      setRefreshing(true);
      var url = '/api/logs/' + encodeURIComponent(currentCategory) + '?tail=' + encodeURIComponent(String(currentTail));
      fetch(url, { method: 'GET', headers: { 'Accept': 'application/json' }, cache: 'no-store' })
        .then(function (res) {
          if (!res.ok) {
            return res.text().then(function (body) {
              throw new Error('HTTP ' + res.status + (body ? (': ' + body.slice(0, 200)) : ''));
            });
          }
          return res.json();
        })
        .then(function (data) {
          renderLogs(data);
          setLastUpdated();
        })
        .catch(function (err) {
          var msg = (err && err.message) ? err.message : '未知错误';
          if (err && err.name === 'TypeError' && /fetch/i.test(msg)) {
            msg = '无法连接到日志服务（请确认 PatchWarden 服务正在运行）';
          }
          showError(msg);
        })
        .finally(function () {
          setRefreshing(false);
        });
    }

    // ---------- Auto-refresh ----------
    function startAutoRefresh() {
      stopAutoRefresh();
      autoRefreshTimer = setInterval(loadLogs, AUTO_REFRESH_INTERVAL_MS);
    }
    function stopAutoRefresh() {
      if (autoRefreshTimer) {
        clearInterval(autoRefreshTimer);
        autoRefreshTimer = null;
      }
    }

    // ---------- Event wiring ----------
    var catBtns = document.querySelectorAll('.cat-btn');
    for (var i = 0; i < catBtns.length; i++) {
      catBtns[i].addEventListener('click', function (ev) {
        var cat = ev.currentTarget.getAttribute('data-cat');
        if (cat && cat !== currentCategory) {
          setCategory(cat);
          loadLogs();
        }
      });
    }

    var tailSelect = $('tailSelect');
    if (tailSelect) {
      tailSelect.value = String(DEFAULT_TAIL);
      tailSelect.addEventListener('change', function (ev) {
        var v = parseInt(ev.target.value, 10);
        if (v === 100 || v === 300 || v === 1000) {
          currentTail = v;
          loadLogs();
        }
      });
    }

    var autoRefreshChk = $('autoRefresh');
    if (autoRefreshChk) {
      autoRefreshChk.addEventListener('change', function (ev) {
        if (ev.target.checked) {
          startAutoRefresh();
        } else {
          stopAutoRefresh();
        }
      });
    }

    var refreshBtn = $('refreshBtn');
    if (refreshBtn) refreshBtn.addEventListener('click', loadLogs);

    // ---------- Initial load ----------
    setCategory(DEFAULT_CATEGORY);
    loadLogs();
  })();
  </script>
</body>
</html>
